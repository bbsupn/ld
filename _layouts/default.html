<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
    }
    .header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .header p { color: var(--text-muted); font-size: 1.1rem; }
    .nav {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav a {
      color: var(--accent);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .nav a:hover { background: rgba(88, 166, 255, 0.1); }
    .content {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    h1 { color: var(--text); margin: 2rem 0 1rem; font-size: 1.8rem; }
    h2 { color: var(--text); margin: 2rem 0 0.8rem; font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h3 { color: var(--text); margin: 1.5rem 0 0.6rem; font-size: 1.15rem; }
    p { margin: 0.6rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 0 6px 6px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    th { background: var(--surface); font-weight: 600; }
    tr:nth-child(even) { background: rgba(22, 27, 34, 0.5); }
    code {
      background: var(--surface);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }
    pre code { background: none; padding: 0; }
    ul, ol { margin: 0.6rem 0; padding-left: 1.5rem; }
    li { margin: 0.3rem 0; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>QQ雷电 Revive</h1>
    <p>让经典重新起飞</p>
  </div>
  <nav class="nav">
    <a href="./">首页</a>
    <a href="./roadmap">开发路线图</a>
    <a href="./technical">技术概览</a>
  </nav>
  <div class="content">
    {{ content }}
  </div>
  <div class="footer">
    QQ雷电RE项目
  </div>
</body>
</html>
